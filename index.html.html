<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Literatur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1712;--ink2:#4a4540;--ink3:#857e76;--ink4:#b5afa8;
  --paper:#faf8f4;--paper2:#f2ede6;--paper3:#e8e1d8;
  --accent:#8b3a2a;--accent2:#c4622e;--gold:#a07828;
  --green:#3a6b42;--green-bg:#eef4ef;--amber-bg:#fdf3e3;--red-bg:#fcecea;
  --border:rgba(26,23,18,0.1);--border2:rgba(26,23,18,0.18);
  --ff-display:'Playfair Display',Georgia,serif;
  --ff-body:'Source Serif 4',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff-body);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.6;min-height:100vh}

header{border-bottom:1px solid var(--border2);padding:1.5rem 2rem 1.25rem;display:flex;align-items:flex-end;gap:2rem;flex-wrap:wrap;background:var(--paper);position:sticky;top:0;z-index:100}
.header-title{flex:1;min-width:200px}
.header-title h1{font-family:var(--ff-display);font-size:2rem;font-weight:400;letter-spacing:-0.02em;line-height:1.1}
.header-sub{font-size:15px;color:var(--ink2);margin-top:5px;font-style:italic;font-family:var(--ff-display);font-weight:400;letter-spacing:0.01em}
.header-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap input{font-family:var(--ff-body);background:var(--paper2);border:1px solid var(--border2);border-radius:4px;padding:7px 12px 7px 32px;font-size:13px;color:var(--ink);width:200px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:13px;pointer-events:none}
.btn{font-family:var(--ff-body);background:transparent;border:1px solid var(--border2);border-radius:4px;padding:7px 14px;font-size:13px;color:var(--ink2);cursor:pointer;white-space:nowrap;transition:background .15s}
.btn:hover{background:var(--paper2)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-edit{border-color:var(--gold);color:var(--gold)}
.btn-edit.on{background:var(--gold);color:#fff}
.btn-export{border-color:var(--green);color:var(--green)}
.btn-export:hover{background:var(--green-bg)}

.stats-bar{background:var(--paper2);border-bottom:1px solid var(--border);padding:.6rem 2rem;display:flex;gap:2rem;font-size:12px;color:var(--ink3);flex-wrap:wrap;align-items:center}
.stats-bar strong{color:var(--ink);font-weight:600}
.save-indicator{margin-left:auto;font-size:11px;color:var(--green);opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}

main{padding:1.5rem 2rem 4rem;max-width:1100px;margin:0 auto}
.edit-add-bar{display:none;margin-bottom:1.5rem}
.edit-mode .edit-add-bar{display:block}

/* Country */
.country-section{margin-bottom:.875rem;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.country-heading{display:flex;align-items:center;gap:12px;padding:.875rem 1.25rem;cursor:pointer;user-select:none;background:var(--paper2);transition:background .15s}
.country-heading:hover{background:var(--paper3)}
.country-flag{font-size:20px}
.country-name{font-family:var(--ff-display);font-size:1.05rem;font-weight:400;font-style:italic;color:var(--ink2);flex:1}
.country-count{font-size:11px;color:var(--ink3);background:var(--paper);border-radius:20px;padding:2px 10px;border:1px solid var(--border2)}
.country-chevron{font-size:16px;color:var(--ink3);transition:transform .22s}
.country-heading.open .country-chevron{transform:rotate(90deg)}
.country-body{display:none;padding:1rem 1.25rem 1.25rem}
.country-body.open{display:block}

/* Author grid */
.author-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:.875rem}
.author-card{background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:box-shadow .2s}
.author-card:hover{box-shadow:0 2px 12px rgba(26,23,18,.08)}
.card-head{display:flex;align-items:flex-start;gap:12px;padding:1rem 1rem .75rem;cursor:pointer;user-select:none}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:13px;font-weight:600;flex-shrink:0;border:1px solid var(--border)}
.card-meta{flex:1}
.card-meta h3{font-family:var(--ff-display);font-size:1rem;font-weight:600;color:var(--ink);line-height:1.2}
.card-meta .years{font-size:11px;color:var(--ink3);margin-top:2px;font-style:italic}
.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:10px;padding:1px 7px;border-radius:20px;border:1px solid}
.tag-genre{background:#f0edf8;color:#4a3580;border-color:#c9c0e8}
.tag-read{background:var(--green-bg);color:#27500a;border-color:#97c459}
.tag-tbr{background:var(--amber-bg);color:#633806;border-color:#efac27}
.tag-prio1{background:var(--red-bg);color:#791f1f;border-color:#f09595}
.expand-btn{color:var(--ink3);font-size:16px;transition:transform .2s;flex-shrink:0;margin-top:2px}
.card-body{display:none;border-top:1px solid var(--border);padding:.875rem 1rem 1rem}
.card-body.open{display:block}
.bio-text{font-size:12.5px;color:var(--ink2);line-height:1.6;font-style:italic;margin-bottom:.875rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:.875rem}
.mini-stat{background:var(--paper2);border-radius:4px;padding:6px 8px;text-align:center}
.mini-stat .n{font-size:18px;font-weight:600;font-family:var(--ff-display);color:var(--ink)}
.mini-stat .l{font-size:10px;color:var(--ink3);margin-top:1px}
.works-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.work-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.work-row:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-read{background:var(--green)}
.dot-unread{background:var(--paper3);border:1px solid var(--ink4)}
.work-title{flex:1;color:var(--ink)}
.work-year{font-size:11px;color:var(--ink3);font-style:italic}
.prio-badge{font-size:10px;padding:1px 7px;border-radius:20px;border:1px solid}
.p1{background:var(--red-bg);color:#791f1f;border-color:#f09595}
.p2{background:var(--amber-bg);color:#633806;border-color:#efac27}
.p3{background:var(--green-bg);color:#27500a;border-color:#97c459}
.read-check{font-size:11px;color:var(--green)}
.edit-actions{display:none;gap:6px;padding:.5rem 1rem;background:var(--amber-bg);border-top:1px solid var(--border)}
.edit-mode .edit-actions{display:flex}
.edit-btn{font-family:var(--ff-body);font-size:11px;background:transparent;border:1px solid var(--border2);border-radius:3px;padding:3px 10px;cursor:pointer;color:var(--ink2)}
.edit-btn:hover{background:var(--paper2)}
.edit-btn.del{color:#791f1f;border-color:#f09595}
.edit-btn.del:hover{background:var(--red-bg)}

/* TBR */
.tbr-section{margin-top:2.5rem;padding-top:1.5rem;border-top:2px solid var(--border2)}
.tbr-section h2{font-family:var(--ff-display);font-size:1.35rem;font-weight:400;font-style:italic;margin-bottom:1rem}
.tbr-prio-group{border:1px solid var(--border2);border-radius:6px;overflow:hidden;margin-bottom:.75rem}
.tbr-prio-head{display:flex;align-items:center;gap:12px;padding:.75rem 1.25rem;cursor:pointer;user-select:none;background:var(--paper2);transition:background .15s}
.tbr-prio-head:hover{background:var(--paper3)}
.tbr-prio-head .prio-badge{font-size:11px;padding:2px 10px}
.tbr-prio-title{font-family:var(--ff-display);font-size:.95rem;font-style:italic;color:var(--ink2);flex:1}
.tbr-prio-count{font-size:11px;color:var(--ink3)}
.tbr-prio-chevron{font-size:16px;color:var(--ink3);transition:transform .22s}
.tbr-prio-head.open .tbr-prio-chevron{transform:rotate(90deg)}
.tbr-prio-body{display:none;padding:.375rem 1.25rem .75rem}
.tbr-prio-body.open{display:block}
.tbr-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.tbr-row:last-child{border-bottom:none}
.tbr-num{width:24px;text-align:right;font-size:12px;color:var(--ink3);font-style:italic;flex-shrink:0}
.tbr-move{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.tbr-arrow{font-size:9px;line-height:1;padding:1px 4px;background:transparent;border:1px solid var(--border2);border-radius:3px;cursor:pointer;color:var(--ink3);font-family:var(--ff-body)}
.tbr-arrow:hover:not(:disabled){background:var(--paper3);color:var(--ink)}
.tbr-arrow:disabled{opacity:.25;cursor:default}
.tbr-title{flex:1;color:var(--ink)}
.tbr-author{font-size:12px;color:var(--ink3);font-style:italic}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,23,18,.5);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--paper);border:1px solid var(--border2);border-radius:8px;padding:1.5rem;width:100%;max-width:620px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:var(--ff-display);font-size:1.3rem;font-weight:600;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.form-row{margin-bottom:.875rem}
.form-row label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.form-row input,.form-row textarea,.form-row select{font-family:var(--ff-body);width:100%;background:#fff;border:1px solid var(--border2);border-radius:4px;padding:7px 10px;font-size:13px;color:var(--ink);outline:none}
.form-row input:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row textarea{height:72px;resize:vertical}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.work-edit-row{display:grid;grid-template-columns:1fr 64px 90px 80px 28px;gap:6px;margin-bottom:6px;align-items:center}
.work-edit-row input,.work-edit-row select{font-family:var(--ff-body);background:#fff;border:1px solid var(--border2);border-radius:3px;padding:5px 7px;font-size:12px;color:var(--ink);width:100%;outline:none}
.work-edit-row input:focus,.work-edit-row select:focus{border-color:var(--accent)}
.rm-btn{background:transparent;border:none;color:var(--ink3);cursor:pointer;font-size:15px;padding:2px;border-radius:3px}
.rm-btn:hover{color:#791f1f;background:var(--red-bg)}
.add-work-btn{font-family:var(--ff-body);font-size:12px;background:transparent;border:1px dashed var(--border2);border-radius:3px;padding:5px 12px;width:100%;cursor:pointer;color:var(--ink3);margin-top:2px}
.add-work-btn:hover{background:var(--paper2)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:.875rem;border-top:1px solid var(--border)}
.btn-cancel-m{font-family:var(--ff-body);background:transparent;border:1px solid var(--border2);border-radius:4px;padding:8px 18px;font-size:13px;cursor:pointer;color:var(--ink2)}
.btn-save-m{font-family:var(--ff-body);background:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:8px 18px;font-size:13px;cursor:pointer;color:#fff;font-weight:600}
.btn-save-m:hover{background:var(--accent2);border-color:var(--accent2)}
footer{text-align:center;font-size:11px;color:var(--ink4);padding:2rem;border-top:1px solid var(--border);font-style:italic}
@media(max-width:600px){header{padding:1.25rem 1rem 1rem;gap:1rem}main{padding:1rem 1rem 3rem}.stats-bar{padding:.5rem 1rem}.author-grid{grid-template-columns:1fr}.header-title h1{font-size:1.5rem}}
</style>
</head>
<body>

<header>
  <div class="header-title">
    <div style="display:flex;align-items:center;gap:1rem">
      <svg width="48" height="52" viewBox="0 0 48 52" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <rect x="4" y="38" width="40" height="8" rx="2" fill="#c4622e" opacity="0.9"/>
        <rect x="6" y="36" width="36" height="3" rx="1" fill="#a07828" opacity="0.7"/>
        <rect x="7" y="27" width="34" height="10" rx="2" fill="#8b3a2a" opacity="0.85"/>
        <rect x="9" y="25" width="30" height="3" rx="1" fill="#c4622e" opacity="0.6"/>
        <rect x="10" y="17" width="28" height="9" rx="2" fill="#a07828" opacity="0.9"/>
        <rect x="12" y="15" width="24" height="3" rx="1" fill="#8b3a2a" opacity="0.5"/>
        <rect x="13" y="8" width="22" height="8" rx="2" fill="#3a6b42" opacity="0.85"/>
        <rect x="15" y="6" width="18" height="3" rx="1" fill="#3a6b42" opacity="0.5"/>
        <rect x="16" y="1" width="16" height="6" rx="2" fill="#4a4540" opacity="0.75"/>
        <line x1="20" y1="1" x2="20" y2="7" stroke="#faf8f4" stroke-width="0.8" opacity="0.4"/>
        <line x1="17" y1="8" x2="17" y2="16" stroke="#faf8f4" stroke-width="0.8" opacity="0.3"/>
        <line x1="14" y1="17" x2="14" y2="25" stroke="#faf8f4" stroke-width="0.8" opacity="0.3"/>
        <line x1="11" y1="27" x2="11" y2="37" stroke="#faf8f4" stroke-width="0.8" opacity="0.3"/>
      </svg>
      <div>
        <h1>Meine Literatur</h1>
        <p class="header-sub">Lieblingsschriftsteller &amp; Leseliste</p>
      </div>
    </div>
  </div>
  <div class="header-controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Suchen…" oninput="onSearch()">
    </div>
    <button class="btn active" id="f-all" onclick="setFilter('all',this)">Alle</button>
    <button class="btn" id="f-tbr" onclick="setFilter('tbr',this)">TBR</button>
    <button class="btn" id="f-gelesen" onclick="setFilter('gelesen',this)">Gelesen</button>
    <button class="btn btn-edit" id="edit-toggle" onclick="toggleEdit()">Bearbeiten</button>
    <button class="btn btn-export" onclick="exportHTML()">&#8615; Exportieren</button>
  </div>
</header>

<div class="stats-bar">
  <span id="stat-text"></span>
  <span class="save-indicator" id="save-indicator">✓ Gespeichert</span>
</div>

<main id="main">
  <div class="edit-add-bar">
    <button class="btn" style="border-color:var(--accent);color:var(--accent)" onclick="openModal(null)">+ Neuen Schriftsteller hinzufügen</button>
  </div>
  <div id="content"></div>
</main>

<footer>Änderungen werden automatisch im Browser gespeichert &mdash; &bdquo;Exportieren&ldquo; erzeugt die aktualisierte HTML-Datei zum Hochladen auf GitHub.</footer>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title">Schriftsteller hinzufügen</h2>
    <div class="form-grid2">
      <div class="form-row"><label>Name <span style="color:#c4622e">*</span></label><input type="text" id="m-name" placeholder="Vollständiger Name"></div>
      <div class="form-row"><label>Lebensdaten</label><input type="text" id="m-years" placeholder="z.B. 1828–1910"></div>
    </div>
    <div class="form-grid2">
      <div class="form-row"><label>Land</label><input type="text" id="m-country" placeholder="z.B. Frankreich"></div>
      <div class="form-row"><label>Genres (Komma-getrennt)</label><input type="text" id="m-genres" placeholder="z.B. Realismus, Roman"></div>
    </div>
    <div class="form-row"><label>Kurz-Bio</label><textarea id="m-bio" placeholder="Kurze Beschreibung des Autors…"></textarea></div>
    <div class="form-row">
      <label>Hauptwerke</label>
      <div style="display:grid;grid-template-columns:1fr 64px 90px 80px 28px;gap:6px;margin-bottom:4px">
        <span style="font-size:10px;color:var(--ink3)">Titel</span>
        <span style="font-size:10px;color:var(--ink3)">Jahr</span>
        <span style="font-size:10px;color:var(--ink3)">Status</span>
        <span style="font-size:10px;color:var(--ink3)">Prio</span>
        <span></span>
      </div>
      <div id="works-editor"></div>
      <button class="add-work-btn" onclick="addWorkRow()">+ Werk hinzufügen</button>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel-m" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save-m" onclick="saveAuthor()">Speichern</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_AUTHORS = [
  {id:1,name:"Leo Tolstoi",years:"1828–1910",country:"Russland",genres:["Realismus","Epischer Roman"],bio:"Einer der bedeutendsten Schriftsteller der Weltliteratur. Romane, Novellen und moralphilosophische Schriften. Beeinflusste Generationen von Autoren und Denkern.",works:[{title:"Krieg und Frieden",year:1869,read:true},{title:"Anna Karenina",year:1878,read:true},{title:"Auferstehung",year:1899,read:false,tbr:2},{title:"Der Tod des Iwan Iljitsch",year:1886,read:false,tbr:1}]},
  {id:2,name:"Fjodor Dostojewski",years:"1821–1881",country:"Russland",genres:["Realismus","Psychologischer Roman"],bio:"Meister des psychologischen Romans und Vorläufer des Existenzialismus. Seine Werke ergründen Schuld, Leiden und den freien Willen in einer dichten, fiebrigen Prosa.",works:[{title:"Schuld und Sühne",year:1866,read:true},{title:"Der Idiot",year:1869,read:true},{title:"Die Brüder Karamasow",year:1880,read:false,tbr:1},{title:"Dämonen",year:1872,read:false,tbr:2},{title:"Der Spieler",year:1867,read:false,tbr:3}]},
  {id:3,name:"Charles Dickens",years:"1812–1870",country:"England",genres:["Viktorianismus","Sozialkritik"],bio:"Größter englischer Romancier des 19. Jahrhunderts. Sein Werk prangert Armut und soziale Ungerechtigkeit mit unvergleichlichem Humor und Pathos an.",works:[{title:"Oliver Twist",year:1839,read:true},{title:"David Copperfield",year:1850,read:true},{title:"Große Erwartungen",year:1861,read:true},{title:"Bleak House",year:1853,read:false,tbr:1},{title:"Dombey und Sohn",year:1848,read:false,tbr:3}]},
  {id:4,name:"Jane Austen",years:"1775–1817",country:"England",genres:["Regency-Roman","Soziale Satire"],bio:"Meisterin des ironischen gesellschaftlichen Romans. Ihre Werke erkunden Heirat, Moral und weibliche Autonomie in der englischen Gentry mit trockenem Witz.",works:[{title:"Stolz und Vorurteil",year:1813,read:true},{title:"Sinn und Sinnlichkeit",year:1811,read:true},{title:"Emma",year:1815,read:true},{title:"Northanger Abbey",year:1817,read:false,tbr:2},{title:"Überredung",year:1817,read:false,tbr:1}]},
  {id:5,name:"Charlotte Brontë",years:"1816–1855",country:"England",genres:["Viktorianismus","Gothischer Roman"],bio:"Die älteste der Brontë-Schwestern. Jane Eyre revolutionierte die Ich-Erzählung mit leidenschaftlicher Innerlichkeit.",works:[{title:"Jane Eyre",year:1847,read:true},{title:"Shirley",year:1849,read:false,tbr:2},{title:"Villette",year:1853,read:false,tbr:1}]},
  {id:6,name:"Emily Brontë",years:"1818–1848",country:"England",genres:["Viktorianismus","Gothischer Roman"],bio:"Schrieb mit Sturmhöhe einen der intensivsten Liebesromane der englischen Literatur — ihr einziger Roman, ein Jahrhundertwerk.",works:[{title:"Sturmhöhe",year:1847,read:true}]},
  {id:7,name:"Anne Brontë",years:"1820–1849",country:"England",genres:["Viktorianismus","Sozialkritik"],bio:"Die jüngste Brontë-Schwester. Die Herrin von Wildfell Hall ist ein frühes feministisches Werk über häusliche Gewalt und weibliche Unabhängigkeit.",works:[{title:"Agnes Grey",year:1847,read:false,tbr:2},{title:"Die Herrin von Wildfell Hall",year:1848,read:false,tbr:1}]},

const COUNTRY_ORDER = ['Russland','Russland / USA','England','Irland','Japan','Japan / England','USA','Kanada','Chile','Kolumbien','Spanien','Italien','Frankreich','Deutschland','Österreich','Südkorea','Schweiz'];

const AV_COLORS = [{bg:'#EEEDFE',c:'#3C3489'},{bg:'#E1F5EE',c:'#085041'},{bg:'#FAECE7',c:'#712B13'},{bg:'#E6F1FB',c:'#0C447C'},{bg:'#FBEAF0',c:'#72243E'},{bg:'#EAF3DE',c:'#27500A'},{bg:'#FAEEDA',c:'#633806'}];
const STORAGE_KEY = 'meine-literatur-v1';

let authors = loadAuthors();
let nextId   = Math.max(...authors.map(a=>a.id)) + 1;
let activeFilter = 'all';
let editMode = false;
let editingId = null;
let openCountries = {};
let openTbrPrios  = {};
let workRowCount  = 0;
let tbrOrder = loadTbrOrder(); // {prio: [{authorId, workTitle}, ...]}

function loadTbrOrder() {
  try { const r=localStorage.getItem(STORAGE_KEY+'-tbrorder'); if(r) return JSON.parse(r); } catch(e) {}
  return {1:[],2:[],3:[]};
}
function saveTbrOrder() {
  try { localStorage.setItem(STORAGE_KEY+'-tbrorder', JSON.stringify(tbrOrder)); } catch(e) {}
}

// Returns ordered TBR items for a given prio, respecting tbrOrder
function getOrderedTbr(prio) {
  const all=[];
  authors.forEach(a=>a.works.filter(w=>!w.read&&w.tbr===prio).forEach(w=>all.push({authorId:a.id,authorName:a.name,title:w.title,year:w.year})));
  const order=tbrOrder[prio]||[];
  // Items that exist in saved order first, then new items appended at end
  const ordered=[];
  order.forEach(o=>{
    const found=all.find(x=>x.authorId===o.authorId&&x.title===o.title);
    if(found) ordered.push(found);
  });
  all.forEach(x=>{ if(!ordered.find(o=>o.authorId===x.authorId&&o.title===x.title)) ordered.push(x); });
  return ordered;
}
function moveTbrItem(prio, idx, dir) {
  const items=getOrderedTbr(prio);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=items.length) return;
  [items[idx],items[newIdx]]=[items[newIdx],items[idx]];
  tbrOrder[prio]=items.map(x=>({authorId:x.authorId,title:x.title}));
  saveTbrOrder();
  saveAuthors();
  render();
}

function loadAuthors() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_AUTHORS));
}
function saveAuthors() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(authors));
    const ind = document.getElementById('save-indicator');
    ind.classList.add('show');
    clearTimeout(ind._t);
    ind._t = setTimeout(()=>ind.classList.remove('show'), 2500);
  } catch(e) {}
}

function exportHTML() {
  const src = document.documentElement.outerHTML;
  const marker = 'const DEFAULT_AUTHORS = [';
  const start  = src.indexOf(marker);
  const end    = src.indexOf('\n];', start) + 3;
  if (start === -1) { alert('Export-Fehler.'); return; }
  const newData = 'const DEFAULT_AUTHORS = ' + JSON.stringify(authors, null, 2) + ';';
  const updated = src.slice(0, start) + newData + src.slice(end);
  const blob = new Blob([updated], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'meine-literatur.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function avStyle(id) { const c=AV_COLORS[id%AV_COLORS.length]; return `background:${c.bg};color:${c.c}`; }
function initials(name) { const p=name.split(' '); return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase(); }

function setFilter(f,btn) {
  activeFilter=f;
  document.querySelectorAll('.btn[id^="f-"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function toggleEdit() {
  editMode=!editMode;
  const btn=document.getElementById('edit-toggle');
  btn.textContent=editMode?'Fertig':'Bearbeiten';
  btn.classList.toggle('on',editMode);
  document.getElementById('main').classList.toggle('edit-mode',editMode);
  render();
}
function toggleCountry(country) {
  openCountries[country]=!openCountries[country];
  const safe=country.replace(/\s/g,'_').replace(/\//g,'_');
  const body=document.getElementById('cb-'+safe);
  const head=document.getElementById('ch-'+safe);
  if(body) body.classList.toggle('open',!!openCountries[country]);
  if(head) head.classList.toggle('open',!!openCountries[country]);
}
function toggleTbrPrio(prio) {
  openTbrPrios[prio]=!openTbrPrios[prio];
  document.getElementById('tbr-body-'+prio)?.classList.toggle('open',!!openTbrPrios[prio]);
  document.getElementById('tbr-head-'+prio)?.classList.toggle('open',!!openTbrPrios[prio]);
}
function toggleCard(id) {
  const body=document.getElementById('body-'+id);
  const exp=document.getElementById('exp-'+id);
  const open=body.classList.toggle('open');
  exp.style.transform=open?'rotate(90deg)':'';
}

function onSearch() {
  const q = document.getElementById('search').value;
  // When search is cleared, close all country sections
  if (q.length === 0) openCountries = {};
  render();
}
function render() {
  const q=document.getElementById('search').value.toLowerCase();
  const isSearching = q.length > 0;
  const list=authors.filter(a=>{
    const m=a.name.toLowerCase().includes(q)||a.genres.some(g=>g.toLowerCase().includes(q))||a.country.toLowerCase().includes(q);
    if(!m) return false;
    if(activeFilter==='tbr')    return a.works.some(w=>!w.read&&w.tbr);
    if(activeFilter==='gelesen') return a.works.some(w=>w.read);
    return true;
  });

  // Auto-open countries that have search hits; restore closed state when search cleared
  if (isSearching) {
    const hitCountries = new Set(list.map(a=>a.country));
    hitCountries.forEach(c=>{ openCountries[c]=true; });
  }

  const totalRead=authors.reduce((s,a)=>s+a.works.filter(w=>w.read).length,0);
  const totalTbr=authors.reduce((s,a)=>s+a.works.filter(w=>!w.read&&w.tbr).length,0);
  const totalW=authors.reduce((s,a)=>s+a.works.length,0);
  document.getElementById('stat-text').innerHTML=
    `<strong>${authors.length}</strong> Schriftsteller &ensp;<strong>${totalW}</strong> Werke &ensp;<strong>${totalRead}</strong> gelesen &ensp;<strong>${totalTbr}</strong> TBR`;

  const grouped={};
  list.forEach(a=>{ if(!grouped[a.country]) grouped[a.country]=[]; grouped[a.country].push(a); });
  const allCountries=[...new Set([...COUNTRY_ORDER,...Object.keys(grouped)])].filter(c=>grouped[c]);

  let html='';
  allCountries.forEach(country=>{
    const group=grouped[country];
    const isOpen=!!openCountries[country];
    const safe=country.replace(/\s/g,'_').replace(/\//g,'_');
    html+=`<div class="country-section">
      <div class="country-heading${isOpen?' open':''}" id="ch-${safe}" onclick="toggleCountry('${country.replace(/'/g,"\\'").replace(/\//g,"\\/")}')">
        <span class="country-flag">${FLAGS[country]||'🌍'}</span>
        <span class="country-name">${country}</span>
        <span class="country-count">${group.length} Autor${group.length!==1?'en':''}</span>
        <span class="country-chevron">›</span>
      </div>
      <div class="country-body${isOpen?' open':''}" id="cb-${safe}">
        <div class="author-grid">`;

    group.forEach(a=>{
      const read=a.works.filter(w=>w.read).length;
      const tbr=a.works.filter(w=>!w.read&&w.tbr);
      const minP=tbr.length?Math.min(...tbr.map(t=>t.tbr)):null;
      html+=`<div class="author-card" id="card-${a.id}">
          <div class="card-head" onclick="toggleCard(${a.id})">
            <div class="avatar" style="${avStyle(a.id)}">${initials(a.name)}</div>
            <div class="card-meta">
              <h3>${a.name}</h3>
              <div class="years">${a.years} · ${a.country}</div>
              <div class="tag-row">
                ${a.genres.map(g=>`<span class="tag tag-genre">${g}</span>`).join('')}
                <span class="tag tag-read">${read} gelesen</span>
                ${tbr.length?`<span class="tag tag-tbr">${tbr.length} TBR</span>`:''}
                ${minP===1?`<span class="tag tag-prio1">Prio 1 offen</span>`:''}
              </div>
            </div>
            <span class="expand-btn" id="exp-${a.id}">›</span>
          </div>
          <div class="card-body" id="body-${a.id}">
            <p class="bio-text">${a.bio}</p>
            <div class="mini-stats">
              <div class="mini-stat"><div class="n">${a.works.length}</div><div class="l">Werke</div></div>
              <div class="mini-stat"><div class="n">${read}</div><div class="l">Gelesen</div></div>
              <div class="mini-stat"><div class="n">${tbr.length}</div><div class="l">TBR</div></div>
            </div>
            <div class="works-label">Hauptwerke</div>
            ${a.works.map(w=>`<div class="work-row">
              <div class="dot ${w.read?'dot-read':'dot-unread'}"></div>
              <div class="work-title">${w.title}</div>
              <div class="work-year">${w.year}</div>
              ${w.tbr?`<span class="prio-badge p${w.tbr}">Prio ${w.tbr}</span>`:''}
              ${w.read?`<span class="read-check">✓</span>`:''}
            </div>`).join('')}
          </div>
          <div class="edit-actions">
            <button class="edit-btn" onclick="openModal(${a.id})">Bearbeiten</button>
            <button class="edit-btn del" onclick="deleteAuthor(${a.id})">Löschen</button>
          </div>
        </div>`;
    });
    html+=`</div></div></div>`;
  });

  // TBR by prio — sortable
  const hasTbr = authors.some(a=>a.works.some(w=>!w.read&&w.tbr));
  if(hasTbr && activeFilter!=='gelesen'){
    const prioLabels={1:'Höchste Priorität',2:'Mittlere Priorität',3:'Niedrige Priorität'};
    html+=`<div class="tbr-section"><h2>To-be-read — Gesamtliste</h2>`;
    [1,2,3].forEach(prio=>{
      const items=getOrderedTbr(prio);
      if(!items.length) return;
      const isOpen=!!openTbrPrios[prio];
      html+=`<div class="tbr-prio-group">
        <div class="tbr-prio-head${isOpen?' open':''}" id="tbr-head-${prio}" onclick="toggleTbrPrio(${prio})">
          <span class="prio-badge p${prio}">Prio ${prio}</span>
          <span class="tbr-prio-title">${prioLabels[prio]}</span>
          <span class="tbr-prio-count">${items.length} Buch${items.length!==1?'er':''}</span>
          <span class="tbr-prio-chevron">›</span>
        </div>
        <div class="tbr-prio-body${isOpen?' open':''}" id="tbr-body-${prio}">
          ${items.map((b,i)=>`
          <div class="tbr-row">
            <div class="tbr-num">${i+1}</div>
            <div class="tbr-move">
              <button class="tbr-arrow" onclick="moveTbrItem(${prio},${i},-1)" ${i===0?'disabled':''} title="Nach oben">▲</button>
              <button class="tbr-arrow" onclick="moveTbrItem(${prio},${i},1)" ${i===items.length-1?'disabled':''} title="Nach unten">▼</button>
            </div>
            <div class="tbr-title">${b.title}</div>
            <div class="tbr-author">— ${b.authorName}</div>
          </div>`).join('')}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('content').innerHTML=html;
}

function deleteAuthor(id) {
  if(!confirm('Schriftsteller wirklich löschen?')) return;
  authors=authors.filter(a=>a.id!==id);
  saveAuthors(); render();
}
function openModal(id) {
  editingId=id;
  const m=id?authors.find(a=>a.id===id):null;
  document.getElementById('modal-title').textContent=id?'Schriftsteller bearbeiten':'Neuen Schriftsteller hinzufügen';
  document.getElementById('m-name').value=m?m.name:'';
  document.getElementById('m-years').value=m?m.years:'';
  document.getElementById('m-country').value=m?m.country:'';
  document.getElementById('m-genres').value=m?m.genres.join(', '):'';
  document.getElementById('m-bio').value=m?m.bio:'';
  document.getElementById('works-editor').innerHTML='';
  workRowCount=0;
  if(m) m.works.forEach(w=>addWorkRow(w)); else addWorkRow();
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); editingId=null; }
function addWorkRow(w) {
  const id=workRowCount++;
  const row=document.createElement('div');
  row.className='work-edit-row';
  row.innerHTML=`
    <input type="text"   id="wt-${id}" placeholder="Titel" value="${w?w.title.replace(/"/g,'&quot;'):''}">
    <input type="number" id="wy-${id}" placeholder="Jahr"  value="${w?w.year:''}" min="1000" max="2099">
    <select id="wr-${id}"><option value="no" ${w&&!w.read?'selected':''}>Nicht gelesen</option><option value="yes" ${w&&w.read?'selected':''}>Gelesen</option></select>
    <select id="wp-${id}"><option value="" ${!w||!w.tbr?'selected':''}>—</option><option value="1" ${w&&w.tbr==1?'selected':''}>Prio 1</option><option value="2" ${w&&w.tbr==2?'selected':''}>Prio 2</option><option value="3" ${w&&w.tbr==3?'selected':''}>Prio 3</option></select>
    <button class="rm-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('works-editor').appendChild(row);
}
function saveAuthor() {
  const name=document.getElementById('m-name').value.trim();
  if(!name){ document.getElementById('m-name').focus(); return; }
  const works=[];
  document.querySelectorAll('.work-edit-row').forEach(row=>{
    const id=row.querySelector('input[type=text]').id.replace('wt-','');
    const t=document.getElementById('wt-'+id)?.value.trim();
    if(!t) return;
    const pv=document.getElementById('wp-'+id)?.value;
    works.push({title:t,year:parseInt(document.getElementById('wy-'+id)?.value)||'',read:document.getElementById('wr-'+id)?.value==='yes',tbr:pv?parseInt(pv):null});
  });
  const entry={id:editingId||nextId,name,years:document.getElementById('m-years').value,country:document.getElementById('m-country').value||'Unbekannt',genres:document.getElementById('m-genres').value.split(',').map(s=>s.trim()).filter(Boolean),bio:document.getElementById('m-bio').value,works};
  if(editingId){ const idx=authors.findIndex(a=>a.id===editingId); if(idx>-1) authors[idx]=entry; }
  else{ authors.push(entry); nextId++; }
  saveAuthors(); closeModal(); render();
}
document.getElementById('modal-bg').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
render();
</script>
</body>
</html>
