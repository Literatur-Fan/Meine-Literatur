<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Literatur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1712;
  --ink2: #4a4540;
  --ink3: #857e76;
  --ink4: #b5afa8;
  --paper: #faf8f4;
  --paper2: #f2ede6;
  --paper3: #e8e1d8;
  --accent: #8b3a2a;
  --accent2: #c4622e;
  --gold: #a07828;
  --green: #3a6b42;
  --green-bg: #eef4ef;
  --amber-bg: #fdf3e3;
  --red-bg: #fcecea;
  --border: rgba(26,23,18,0.1);
  --border2: rgba(26,23,18,0.18);
  --ff-display: 'Playfair Display', Georgia, serif;
  --ff-body: 'Source Serif 4', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--ff-body);
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Header ── */
header {
  border-bottom: 1px solid var(--border2);
  padding: 2rem 2rem 1.5rem;
  display: flex;
  align-items: flex-end;
  gap: 2rem;
  flex-wrap: wrap;
  background: var(--paper);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { flex: 1; min-width: 200px; }
.header-title h1 {
  font-family: var(--ff-display);
  font-size: 2rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.1;
}
.header-title p {
  font-size: 13px;
  color: var(--ink3);
  margin-top: 4px;
  font-style: italic;
}
.header-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
}
.search-wrap input {
  font-family: var(--ff-body);
  background: var(--paper2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 7px 12px 7px 32px;
  font-size: 13px;
  color: var(--ink);
  width: 200px;
  outline: none;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--ink3); font-size: 13px; pointer-events: none;
}
.btn {
  font-family: var(--ff-body);
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--ink2);
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, border-color .15s;
}
.btn:hover { background: var(--paper2); border-color: var(--border2); }
.btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-edit { border-color: var(--gold); color: var(--gold); }
.btn-edit:hover { background: var(--amber-bg); }
.btn-edit.on { background: var(--gold); color: #fff; }

/* ── Stats bar ── */
.stats-bar {
  background: var(--paper2);
  border-bottom: 1px solid var(--border);
  padding: .6rem 2rem;
  display: flex;
  gap: 2rem;
  font-size: 12px;
  color: var(--ink3);
  flex-wrap: wrap;
}
.stats-bar strong { color: var(--ink); font-weight: 600; }

/* ── Main layout ── */
main { padding: 1.5rem 2rem 4rem; max-width: 1100px; margin: 0 auto; }

/* ── Country section ── */
.country-section { margin-bottom: 3rem; }
.country-heading {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
  padding-bottom: .75rem;
  border-bottom: 1px solid var(--border2);
}
.country-flag { font-size: 22px; }
.country-name {
  font-family: var(--ff-display);
  font-size: 1.2rem;
  font-weight: 400;
  font-style: italic;
  color: var(--ink2);
}
.country-count {
  font-size: 12px;
  color: var(--ink3);
  background: var(--paper3);
  border-radius: 20px;
  padding: 2px 10px;
  border: 1px solid var(--border);
}

/* ── Author card ── */
.author-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}
.author-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  transition: box-shadow .2s;
}
.author-card:hover { box-shadow: 0 2px 12px rgba(26,23,18,.08); }
.card-head {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 1rem 1rem .75rem;
  cursor: pointer;
  user-select: none;
}
.avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-display);
  font-size: 13px; font-weight: 600;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.card-meta { flex: 1; }
.card-meta h3 {
  font-family: var(--ff-display);
  font-size: 1rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.2;
}
.card-meta .years {
  font-size: 11px;
  color: var(--ink3);
  margin-top: 2px;
  font-style: italic;
}
.tag-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.tag {
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 20px;
  border: 1px solid;
  font-family: var(--ff-body);
}
.tag-genre { background: #f0edf8; color: #4a3580; border-color: #c9c0e8; }
.tag-read { background: var(--green-bg); color: #27500a; border-color: #97c459; }
.tag-tbr { background: var(--amber-bg); color: #633806; border-color: #efac27; }
.tag-prio1 { background: var(--red-bg); color: #791f1f; border-color: #f09595; }

.expand-btn {
  color: var(--ink3); font-size: 16px;
  transition: transform .2s; flex-shrink: 0;
  margin-top: 2px;
}

/* ── Card body ── */
.card-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: .875rem 1rem 1rem;
}
.card-body.open { display: block; }
.bio-text {
  font-size: 12.5px;
  color: var(--ink2);
  line-height: 1.6;
  font-style: italic;
  margin-bottom: .875rem;
  padding-bottom: .75rem;
  border-bottom: 1px solid var(--border);
}
.mini-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: .875rem;
}
.mini-stat {
  background: var(--paper2);
  border-radius: 4px;
  padding: 6px 8px;
  text-align: center;
}
.mini-stat .n { font-size: 18px; font-weight: 600; font-family: var(--ff-display); color: var(--ink); }
.mini-stat .l { font-size: 10px; color: var(--ink3); margin-top: 1px; }
.works-label {
  font-size: 10px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink3);
  margin-bottom: 6px;
}
.work-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12.5px;
}
.work-row:last-child { border-bottom: none; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-read { background: var(--green); }
.dot-unread { background: var(--paper3); border: 1px solid var(--ink4); }
.work-title { flex: 1; color: var(--ink); }
.work-year { font-size: 11px; color: var(--ink3); font-style: italic; }
.prio-badge {
  font-size: 10px; padding: 1px 7px; border-radius: 20px;
  border: 1px solid;
}
.p1 { background: var(--red-bg); color: #791f1f; border-color: #f09595; }
.p2 { background: var(--amber-bg); color: #633806; border-color: #efac27; }
.p3 { background: var(--green-bg); color: #27500a; border-color: #97c459; }
.read-check { font-size: 11px; color: var(--green); }

/* ── Edit mode ── */
.edit-actions {
  display: none;
  gap: 6px;
  padding: .5rem 1rem;
  background: var(--amber-bg);
  border-top: 1px solid var(--border);
}
.edit-mode .edit-actions { display: flex; }
.edit-btn {
  font-family: var(--ff-body);
  font-size: 11px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 3px 10px;
  cursor: pointer;
  color: var(--ink2);
}
.edit-btn:hover { background: var(--paper2); }
.edit-btn.del { color: #791f1f; border-color: #f09595; }
.edit-btn.del:hover { background: var(--red-bg); }

/* ── Modal ── */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,23,18,.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--paper);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 1.5rem;
  width: 100%;
  max-width: 620px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h2 {
  font-family: var(--ff-display);
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 1.25rem;
  padding-bottom: .75rem;
  border-bottom: 1px solid var(--border);
}
.form-row { margin-bottom: .875rem; }
.form-row label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 4px;
}
.form-row input,
.form-row textarea,
.form-row select {
  font-family: var(--ff-body);
  width: 100%;
  background: #fff;
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 7px 10px;
  font-size: 13px;
  color: var(--ink);
  outline: none;
}
.form-row input:focus,
.form-row textarea:focus { border-color: var(--accent); }
.form-row textarea { height: 72px; resize: vertical; }
.form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.works-editor { margin-top: .5rem; }
.work-edit-row {
  display: grid;
  grid-template-columns: 1fr 64px 90px 80px 28px;
  gap: 6px;
  margin-bottom: 6px;
  align-items: center;
}
.work-edit-row input,
.work-edit-row select {
  font-family: var(--ff-body);
  background: #fff;
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 5px 7px;
  font-size: 12px;
  color: var(--ink);
  width: 100%;
  outline: none;
}
.work-edit-row input:focus,
.work-edit-row select:focus { border-color: var(--accent); }
.rm-btn {
  background: transparent;
  border: none;
  color: var(--ink3);
  cursor: pointer;
  font-size: 15px;
  padding: 2px;
  border-radius: 3px;
}
.rm-btn:hover { color: #791f1f; background: var(--red-bg); }
.add-work-btn {
  font-family: var(--ff-body);
  font-size: 12px;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: 3px;
  padding: 5px 12px;
  width: 100%;
  cursor: pointer;
  color: var(--ink3);
  margin-top: 2px;
}
.add-work-btn:hover { background: var(--paper2); }
.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 1.25rem;
  padding-top: .875rem;
  border-top: 1px solid var(--border);
}
.btn-cancel-m {
  font-family: var(--ff-body);
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 8px 18px;
  font-size: 13px;
  cursor: pointer;
  color: var(--ink2);
}
.btn-save-m {
  font-family: var(--ff-body);
  background: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 8px 18px;
  font-size: 13px;
  cursor: pointer;
  color: #fff;
  font-weight: 600;
}
.btn-save-m:hover { background: var(--accent2); border-color: var(--accent2); }

/* ── TBR section ── */
.tbr-section {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 2px solid var(--border2);
}
.tbr-section h2 {
  font-family: var(--ff-display);
  font-size: 1.4rem;
  font-weight: 400;
  font-style: italic;
  margin-bottom: 1.25rem;
}
.tbr-list { }
.tbr-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.tbr-row:last-child { border-bottom: none; }
.tbr-num {
  width: 24px; text-align: right;
  font-size: 12px; color: var(--ink3);
  font-style: italic; flex-shrink: 0;
}
.tbr-title { flex: 1; color: var(--ink); }
.tbr-author { font-size: 12px; color: var(--ink3); font-style: italic; }

/* ── Empty state ── */
.empty {
  padding: 3rem;
  text-align: center;
  color: var(--ink3);
  font-style: italic;
}

/* ── Add country btn ── */
.add-author-bar {
  display: none;
  margin-bottom: 2rem;
}
.edit-mode .add-author-bar { display: block; }

/* ── Footer ── */
footer {
  text-align: center;
  font-size: 11px;
  color: var(--ink4);
  padding: 2rem;
  border-top: 1px solid var(--border);
  font-style: italic;
}

@media (max-width: 600px) {
  header { padding: 1.25rem 1rem 1rem; gap: 1rem; }
  main { padding: 1rem 1rem 3rem; }
  .stats-bar { padding: .5rem 1rem; }
  .author-grid { grid-template-columns: 1fr; }
  .header-title h1 { font-size: 1.5rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Meine Literatur</h1>
    <p>Lieblingsschriftsteller &amp; Leseliste</p>
  </div>
  <div class="header-controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Suchen…" oninput="render()">
    </div>
    <button class="btn active" id="f-all" onclick="setFilter('all',this)">Alle</button>
    <button class="btn" id="f-tbr" onclick="setFilter('tbr',this)">TBR</button>
    <button class="btn" id="f-gelesen" onclick="setFilter('gelesen',this)">Gelesen</button>
    <button class="btn btn-edit" id="edit-toggle" onclick="toggleEdit()">Bearbeiten</button>
  </div>
</header>

<div class="stats-bar" id="stats-bar"></div>

<main id="main">
  <div class="add-author-bar">
    <button class="btn" style="border-color:var(--accent);color:var(--accent)" onclick="openModal(null)">+ Neuen Schriftsteller hinzufügen</button>
  </div>
  <div id="content"></div>
</main>

<footer>Diese Seite enthält keine externe Datenbank &mdash; alle Daten sind direkt in der HTML-Datei gespeichert.</footer>

<!-- Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title">Schriftsteller hinzufügen</h2>
    <div class="form-grid2">
      <div class="form-row">
        <label>Name <span style="color:#c4622e">*</span></label>
        <input type="text" id="m-name" placeholder="Vollständiger Name">
      </div>
      <div class="form-row">
        <label>Lebensdaten</label>
        <input type="text" id="m-years" placeholder="z.B. 1828–1910">
      </div>
    </div>
    <div class="form-grid2">
      <div class="form-row">
        <label>Land</label>
        <input type="text" id="m-country" placeholder="z.B. Russland">
      </div>
      <div class="form-row">
        <label>Genres (Komma-getrennt)</label>
        <input type="text" id="m-genres" placeholder="z.B. Realismus, Roman">
      </div>
    </div>
    <div class="form-row">
      <label>Kurz-Bio</label>
      <textarea id="m-bio" placeholder="Kurze Beschreibung des Autors…"></textarea>
    </div>
    <div class="form-row">
      <label>Hauptwerke</label>
      <div style="display:grid;grid-template-columns:1fr 64px 90px 80px 28px;gap:6px;margin-bottom:4px">
        <span style="font-size:10px;color:var(--ink3)">Titel</span>
        <span style="font-size:10px;color:var(--ink3)">Jahr</span>
        <span style="font-size:10px;color:var(--ink3)">Status</span>
        <span style="font-size:10px;color:var(--ink3)">Prio</span>
        <span></span>
      </div>
      <div id="works-editor"></div>
      <button class="add-work-btn" onclick="addWorkRow()">+ Werk hinzufügen</button>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel-m" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save-m" onclick="saveAuthor()">Speichern</button>
    </div>
  </div>
</div>

let nextId = 23;
let activeFilter = 'all';
let editMode = false;
let editingId = null;

// Avatar colors cycling
const avColors = [
  { bg:'#EEEDFE', color:'#3C3489' },
  { bg:'#E1F5EE', color:'#085041' },
  { bg:'#FAECE7', color:'#712B13' },
  { bg:'#E6F1FB', color:'#0C447C' },
  { bg:'#FBEAF0', color:'#72243E' },
  { bg:'#EAF3DE', color:'#27500A' },
  { bg:'#FAEEDA', color:'#633806' },
];

function avStyle(id) {
  const c = avColors[id % avColors.length];
  return `background:${c.bg};color:${c.color}`;
}

function initials(name) {
  const p = name.split(' ');
  if (p.length >= 2) return (p[0][0] + p[p.length-1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.btn[id^="f-"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('edit-toggle');
  btn.textContent = editMode ? 'Fertig' : 'Bearbeiten';
  btn.classList.toggle('on', editMode);
  document.getElementById('main').classList.toggle('edit-mode', editMode);
  render();
}

// Group by country
function groupByCountry(list) {
  const map = {};
  list.forEach(a => {
    if (!map[a.country]) map[a.country] = [];
    map[a.country].push(a);
  });
  return map;
}

const countryOrder = [
  'Russland','England','Japan','Japan / England','USA','Kanada','Spanien','Frankreich','Schweiz'
];

const flags = {
  'Russland': '🇷🇺',
  'England': '🇬🇧',
  'Japan': '🇯🇵',
  'Japan / England': '🇯🇵🇬🇧',
  'USA': '🇺🇸',
  'Kanada': '🇨🇦',
  'Spanien': '🇪🇸',
  'Frankreich': '🇫🇷',
  'Schweiz': '🇨🇭',
};

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = authors.filter(a => {
    const match = a.name.toLowerCase().includes(q)
      || a.genres.some(g => g.toLowerCase().includes(q))
      || a.country.toLowerCase().includes(q);
    if (!match) return false;
    if (activeFilter === 'tbr') return a.works.some(w => !w.read && w.tbr);
    if (activeFilter === 'gelesen') return a.works.some(w => w.read);
    return true;
  });

  // Stats
  const totalRead = authors.reduce((s,a) => s + a.works.filter(w=>w.read).length, 0);
  const totalTbr  = authors.reduce((s,a) => s + a.works.filter(w=>!w.read&&w.tbr).length, 0);
  document.getElementById('stats-bar').innerHTML =
    `<span><strong>${authors.length}</strong> Schriftsteller</span>` +
    `<span><strong>${authors.reduce((s,a)=>s+a.works.length,0)}</strong> Werke gesamt</span>` +
    `<span><strong>${totalRead}</strong> gelesen</span>` +
    `<span><strong>${totalTbr}</strong> auf der TBR-Liste</span>`;

  const grouped = groupByCountry(list);
  const allCountries = [...new Set([...countryOrder, ...Object.keys(grouped)])].filter(c => grouped[c]);

  let html = '';

  if (editMode) {
    html += `<div class="add-author-bar" style="display:block;margin-bottom:1.5rem">
      <button class="btn" style="border-color:var(--accent);color:var(--accent)" onclick="openModal(null)">+ Neuen Schriftsteller hinzufügen</button>
    </div>`;
  }

  if (allCountries.length === 0) {
    html += `<div class="empty">Keine Einträge gefunden.</div>`;
  }

  allCountries.forEach(country => {
    const group = grouped[country];
    html += `<div class="country-section">
      <div class="country-heading">
        <span class="country-flag">${flags[country] || '🌍'}</span>
        <span class="country-name">${country}</span>
        <span class="country-count">${group.length} Autor${group.length!==1?'en':''}</span>
      </div>
      <div class="author-grid">`;

    group.forEach(a => {
      const read = a.works.filter(w=>w.read).length;
      const tbr  = a.works.filter(w=>!w.read&&w.tbr);
      const minP = tbr.length ? Math.min(...tbr.map(t=>t.tbr)) : null;

      html += `<div class="author-card" id="card-${a.id}">
        <div class="card-head" onclick="toggleCard(${a.id})">
          <div class="avatar" style="${avStyle(a.id)}">${initials(a.name)}</div>
          <div class="card-meta">
            <h3>${a.name}</h3>
            <div class="years">${a.years} · ${a.country}</div>
            <div class="tag-row">
              ${a.genres.map(g=>`<span class="tag tag-genre">${g}</span>`).join('')}
              <span class="tag tag-read">${read} gelesen</span>
              ${tbr.length ? `<span class="tag tag-tbr">${tbr.length} TBR</span>` : ''}
              ${minP===1 ? `<span class="tag tag-prio1">Prio 1 offen</span>` : ''}
            </div>
          </div>
          <span class="expand-btn" id="exp-${a.id}">›</span>
        </div>
        <div class="card-body" id="body-${a.id}">
          <p class="bio-text">${a.bio}</p>
          <div class="mini-stats">
            <div class="mini-stat"><div class="n">${a.works.length}</div><div class="l">Werke</div></div>
            <div class="mini-stat"><div class="n">${read}</div><div class="l">Gelesen</div></div>
            <div class="mini-stat"><div class="n">${tbr.length}</div><div class="l">TBR</div></div>
          </div>
          <div class="works-label">Hauptwerke</div>
          ${a.works.map(w => `
            <div class="work-row">
              <div class="dot ${w.read?'dot-read':'dot-unread'}" title="${w.read?'Gelesen':'Nicht gelesen'}"></div>
              <div class="work-title">${w.title}</div>
              <div class="work-year">${w.year}</div>
              ${w.tbr ? `<span class="prio-badge p${w.tbr}">Prio ${w.tbr}</span>` : ''}
              ${w.read ? `<span class="read-check">✓</span>` : ''}
            </div>
          `).join('')}
        </div>
        <div class="edit-actions">
          <button class="edit-btn" onclick="openModal(${a.id})">Bearbeiten</button>
          <button class="edit-btn del" onclick="deleteAuthor(${a.id})">Löschen</button>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  // TBR global list
  const allTbr = [];
  authors.forEach(a => a.works.filter(w=>!w.read&&w.tbr).forEach(w => allTbr.push({...w, author: a.name})));
  allTbr.sort((a,b) => a.tbr - b.tbr);

  if (allTbr.length && activeFilter !== 'gelesen') {
    html += `<div class="tbr-section">
      <h2>To-be-read — Gesamtliste</h2>
      <div class="tbr-list">
        ${allTbr.map((b,i) => `
          <div class="tbr-row">
            <div class="tbr-num">${i+1}</div>
            <span class="prio-badge p${b.tbr}">Prio ${b.tbr}</span>
            <div class="tbr-title">${b.title}</div>
            <div class="tbr-author">— ${b.author}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  const exp  = document.getElementById('exp-' + id);
  const open = body.classList.toggle('open');
  exp.style.transform = open ? 'rotate(90deg)' : '';
}

function deleteAuthor(id) {
  if (!confirm('Schriftsteller wirklich löschen?')) return;
  authors = authors.filter(a => a.id !== id);
  render();
}

// ── Modal ──
function openModal(id) {
  editingId = id;
  const m = id ? authors.find(a => a.id === id) : null;
  document.getElementById('modal-title').textContent = id ? 'Schriftsteller bearbeiten' : 'Neuen Schriftsteller hinzufügen';
  document.getElementById('m-name').value   = m ? m.name : '';
  document.getElementById('m-years').value  = m ? m.years : '';
  document.getElementById('m-country').value = m ? m.country : '';
  document.getElementById('m-genres').value = m ? m.genres.join(', ') : '';
  document.getElementById('m-bio').value    = m ? m.bio : '';
  const editor = document.getElementById('works-editor');
  editor.innerHTML = '';
  if (m) {
    m.works.forEach(w => addWorkRow(w));
  } else {
    addWorkRow();
  }
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  editingId = null;
}

let workRowCount = 0;
function addWorkRow(w) {
  const id = workRowCount++;
  const row = document.createElement('div');
  row.className = 'work-edit-row';
  row.innerHTML = `
    <input type="text" id="wt-${id}" placeholder="Titel" value="${w ? w.title : ''}">
    <input type="number" id="wy-${id}" placeholder="Jahr" value="${w ? w.year : ''}" min="1000" max="2099">
    <select id="wr-${id}">
      <option value="no" ${w&&!w.read?'selected':''}>Nicht gelesen</option>
      <option value="yes" ${w&&w.read?'selected':''}>Gelesen</option>
    </select>
    <select id="wp-${id}">
      <option value="" ${!w||!w.tbr?'selected':''}>—</option>
      <option value="1" ${w&&w.tbr==1?'selected':''}>Prio 1</option>
      <option value="2" ${w&&w.tbr==2?'selected':''}>Prio 2</option>
      <option value="3" ${w&&w.tbr==3?'selected':''}>Prio 3</option>
    </select>
    <button class="rm-btn" onclick="this.parentElement.remove()">×</button>
  `;
  document.getElementById('works-editor').appendChild(row);
}

function saveAuthor() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }

  const works = [];
  document.querySelectorAll('.work-edit-row').forEach(row => {
    const ids = row.querySelector('input[type=text]').id.replace('wt-','');
    const t = document.getElementById('wt-'+ids)?.value.trim();
    if (!t) return;
    const pv = document.getElementById('wp-'+ids)?.value;
    works.push({
      title: t,
      year: parseInt(document.getElementById('wy-'+ids)?.value) || '',
      read: document.getElementById('wr-'+ids)?.value === 'yes',
      tbr: pv ? parseInt(pv) : null,
    });
  });

  if (editingId) {
    const idx = authors.findIndex(a => a.id === editingId);
    if (idx > -1) {
      authors[idx] = { ...authors[idx],
        name, years: document.getElementById('m-years').value,
        country: document.getElementById('m-country').value || 'Unbekannt',
        genres: document.getElementById('m-genres').value.split(',').map(s=>s.trim()).filter(Boolean),
        bio: document.getElementById('m-bio').value,
        works,
      };
    }
  } else {
    authors.push({
      id: nextId++,
      name,
      years: document.getElementById('m-years').value,
      country: document.getElementById('m-country').value || 'Unbekannt',
      genres: document.getElementById('m-genres').value.split(',').map(s=>s.trim()).filter(Boolean),
      bio: document.getElementById('m-bio').value,
      works,
    });
  }
  closeModal();
  render();
}

// Close modal on bg click
document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

render();
</script>
