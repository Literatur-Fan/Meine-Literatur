<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Literatur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1712;--ink2:#4a4540;--ink3:#857e76;--ink4:#b5afa8;--paper:#faf8f4;--paper2:#f2ede6;--paper3:#e8e1d8;--accent:#8b3a2a;--accent2:#c4622e;--gold:#a07828;--green:#3a6b42;--green-bg:#eef4ef;--amber-bg:#fdf3e3;--red-bg:#fcecea;--border:rgba(26,23,18,0.1);--border2:rgba(26,23,18,0.18);--ff-display:'Playfair Display',Georgia,serif;--ff-body:'Source Serif 4',Georgia,serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff-body);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.6;min-height:100vh}
header{border-bottom:1px solid var(--border2);padding:1.25rem 2rem 1rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap;background:var(--paper);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:.875rem;flex:1;min-width:220px}
.header-title h1{font-family:var(--ff-display);font-size:1.9rem;font-weight:400;letter-spacing:-0.02em;line-height:1.1}
.header-sub{font-size:15px;color:var(--ink2);margin-top:4px;font-style:italic;font-family:var(--ff-display)}
.header-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap input{font-family:var(--ff-body);background:var(--paper2);border:1px solid var(--border2);border-radius:4px;padding:7px 12px 7px 32px;font-size:13px;color:var(--ink);width:200px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:13px;pointer-events:none}
.btn{font-family:var(--ff-body);background:transparent;border:1px solid var(--border2);border-radius:4px;padding:7px 14px;font-size:13px;color:var(--ink2);cursor:pointer;white-space:nowrap;transition:background .15s}
.btn:hover{background:var(--paper2)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-edit{border-color:var(--gold);color:var(--gold)}
.btn-edit.on{background:var(--gold);color:#fff}
.btn-export{border-color:var(--green);color:var(--green)}
.btn-export:hover{background:var(--green-bg)}
.stats-bar{background:var(--paper2);border-bottom:1px solid var(--border);padding:.5rem 2rem;display:flex;gap:2rem;font-size:12px;color:var(--ink3);flex-wrap:wrap;align-items:center}
.stats-bar strong{color:var(--ink);font-weight:600}
.save-indicator{margin-left:auto;font-size:11px;color:var(--green);opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}
main{padding:1.5rem 2rem 4rem;max-width:1100px;margin:0 auto}
.edit-add-bar{display:none;margin-bottom:1.5rem}
.edit-mode .edit-add-bar{display:block}
.country-section{margin-bottom:.75rem;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.country-heading{display:flex;align-items:center;gap:12px;padding:.75rem 1.25rem;cursor:pointer;user-select:none;background:var(--paper2);transition:background .15s}
.country-heading:hover{background:var(--paper3)}
.country-flag{font-size:18px}
.country-name{font-family:var(--ff-display);font-size:1rem;font-weight:400;font-style:italic;color:var(--ink2);flex:1}
.country-count{font-size:11px;color:var(--ink3);background:var(--paper);border-radius:20px;padding:2px 10px;border:1px solid var(--border2)}
.country-chevron{font-size:16px;color:var(--ink3);transition:transform .22s}
.country-heading.open .country-chevron{transform:rotate(90deg)}
.country-body{display:none;padding:.875rem 1.25rem 1.25rem}
.country-body.open{display:block}
.author-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:.875rem}
.author-card{background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:box-shadow .2s}
.author-card:hover{box-shadow:0 2px 12px rgba(26,23,18,.08)}
.card-head{display:flex;align-items:flex-start;gap:12px;padding:.875rem .875rem .625rem;cursor:pointer;user-select:none}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:12px;font-weight:600;flex-shrink:0;border:1px solid var(--border)}
.card-meta{flex:1}
.card-meta h3{font-family:var(--ff-display);font-size:.95rem;font-weight:600;color:var(--ink);line-height:1.2}
.card-meta .years{font-size:10px;color:var(--ink3);margin-top:2px;font-style:italic}
.tag-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:9px;padding:1px 6px;border-radius:20px;border:1px solid}
.tag-genre{background:#f0edf8;color:#4a3580;border-color:#c9c0e8}
.tag-read{background:var(--green-bg);color:#27500a;border-color:#97c459}
.tag-tbr{background:var(--amber-bg);color:#633806;border-color:#efac27}
.tag-prio1{background:var(--red-bg);color:#791f1f;border-color:#f09595}
.expand-btn{color:var(--ink3);font-size:15px;transition:transform .2s;flex-shrink:0;margin-top:2px}
.card-body{display:none;border-top:1px solid var(--border);padding:.75rem .875rem .875rem}
.card-body.open{display:block}
.bio-text{font-size:12px;color:var(--ink2);line-height:1.6;font-style:italic;margin-bottom:.75rem;padding-bottom:.625rem;border-bottom:1px solid var(--border)}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.75rem}
.mini-stat{background:var(--paper2);border-radius:4px;padding:5px 6px;text-align:center}
.mini-stat .n{font-size:16px;font-weight:600;font-family:var(--ff-display);color:var(--ink)}
.mini-stat .l{font-size:9px;color:var(--ink3);margin-top:1px}
.works-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.works-hint{font-size:9px;color:var(--ink4);font-weight:400;font-style:italic;text-transform:none;letter-spacing:0}
.work-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.work-row:last-child{border-bottom:none}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .15s}
.dot:hover{transform:scale(1.5)}
.dot-read{background:var(--green)}
.dot-unread{background:var(--paper3);border:1px solid var(--ink4)}
.work-title{flex:1;color:var(--ink)}
.work-title.is-read{color:var(--ink3);text-decoration:line-through;text-decoration-color:var(--ink4)}
.work-year{font-size:10px;color:var(--ink3);font-style:italic;white-space:nowrap}
.prio-badge{font-size:9px;padding:1px 6px;border-radius:20px;border:1px solid;white-space:nowrap;flex-shrink:0}
.p1{background:var(--red-bg);color:#791f1f;border-color:#f09595}
.p2{background:var(--amber-bg);color:#633806;border-color:#efac27}
.p3{background:var(--green-bg);color:#27500a;border-color:#97c459}
.read-check{font-size:11px;color:var(--green);flex-shrink:0}
.prio-sel{font-family:var(--ff-body);font-size:10px;border:1px solid var(--border2);border-radius:3px;background:var(--paper2);color:var(--ink2);padding:1px 2px;cursor:pointer;outline:none;flex-shrink:0}
.prio-sel:focus{border-color:var(--accent)}
.edit-actions{display:none;gap:6px;padding:.4rem .875rem;background:var(--amber-bg);border-top:1px solid var(--border)}
.edit-mode .edit-actions{display:flex}
.edit-btn{font-family:var(--ff-body);font-size:11px;background:transparent;border:1px solid var(--border2);border-radius:3px;padding:3px 10px;cursor:pointer;color:var(--ink2)}
.edit-btn:hover{background:var(--paper2)}
.edit-btn.del{color:#791f1f;border-color:#f09595}
.edit-btn.del:hover{background:var(--red-bg)}
.tbr-section{margin-top:2.5rem;padding-top:1.5rem;border-top:2px solid var(--border2)}
.tbr-section h2{font-family:var(--ff-display);font-size:1.3rem;font-weight:400;font-style:italic;margin-bottom:1rem}
.tbr-prio-group{border:1px solid var(--border2);border-radius:6px;overflow:hidden;margin-bottom:.75rem}
.tbr-prio-head{display:flex;align-items:center;gap:12px;padding:.75rem 1.25rem;cursor:pointer;user-select:none;background:var(--paper2);transition:background .15s}
.tbr-prio-head:hover{background:var(--paper3)}
.tbr-prio-head .prio-badge{font-size:11px;padding:2px 10px}
.tbr-prio-title{font-family:var(--ff-display);font-size:.95rem;font-style:italic;color:var(--ink2);flex:1}
.tbr-prio-count{font-size:11px;color:var(--ink3)}
.tbr-prio-chevron{font-size:16px;color:var(--ink3);transition:transform .22s}
.tbr-prio-head.open .tbr-prio-chevron{transform:rotate(90deg)}
.tbr-prio-body{display:none;padding:.375rem 1.25rem .75rem}
.tbr-prio-body.open{display:block}
.tbr-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.tbr-row:last-child{border-bottom:none}
.tbr-num{width:24px;text-align:right;font-size:12px;color:var(--ink3);font-style:italic;flex-shrink:0}
.tbr-move{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.tbr-arrow{font-size:9px;line-height:1;padding:1px 4px;background:transparent;border:1px solid var(--border2);border-radius:3px;cursor:pointer;color:var(--ink3);font-family:var(--ff-body)}
.tbr-arrow:hover:not([disabled]){background:var(--paper3);color:var(--ink)}
.tbr-arrow[disabled]{opacity:.25;cursor:default}
.tbr-title{flex:1;color:var(--ink)}
.tbr-author{font-size:12px;color:var(--ink3);font-style:italic}
.top10-section{margin-bottom:1.25rem;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.top10-heading{display:flex;align-items:center;gap:12px;padding:.75rem 1.25rem;cursor:pointer;user-select:none;background:linear-gradient(to right,#fdf3e3,var(--paper2));transition:background .15s}
.top10-heading:hover{background:var(--paper3)}
.top10-crown{font-size:18px}
.top10-title{font-family:var(--ff-display);font-size:1rem;font-weight:600;font-style:italic;color:var(--ink);flex:1}
.top10-subtitle{font-size:11px;color:var(--ink3);font-style:italic}
.top10-chevron{font-size:16px;color:var(--ink3);transition:transform .22s}
.top10-heading.open .top10-chevron{transform:rotate(90deg)}
.top10-body{display:none;padding:.75rem 1.25rem 1rem}
.top10-body.open{display:block}
.top10-hint{font-size:11px;color:var(--ink3);font-style:italic;margin-bottom:.875rem}
.top10-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.top10-row:last-child{border-bottom:none}
.top10-rank{width:22px;text-align:center;font-family:var(--ff-display);font-size:13px;font-weight:600;color:var(--gold);flex-shrink:0}
.top10-rank-1{color:#b8860b;font-size:15px}
.top10-rank-2{color:#888}
.top10-rank-3{color:#a0724a}
.top10-move{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.top10-arrow{font-size:9px;line-height:1;padding:1px 4px;background:transparent;border:1px solid var(--border2);border-radius:3px;cursor:pointer;color:var(--ink3);font-family:var(--ff-body)}
.top10-arrow:hover:not([disabled]){background:var(--paper3);color:var(--ink)}
.top10-arrow[disabled]{opacity:.2;cursor:default}
.top10-author-sel{font-family:var(--ff-body);font-size:12px;background:transparent;border:none;border-bottom:1px dashed var(--border2);outline:none;color:var(--ink);width:100%;padding:1px 0;cursor:pointer}
.top10-author-sel:focus{border-bottom-color:var(--accent)}
.top10-del{background:transparent;border:none;color:var(--ink4);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:3px;flex-shrink:0}
.top10-del:hover{color:#791f1f;background:var(--red-bg)}
.top10-add-btn{font-family:var(--ff-body);font-size:12px;background:transparent;border:1px dashed var(--border2);border-radius:4px;padding:5px 14px;cursor:pointer;color:var(--ink3);margin-top:.625rem}
.top10-add-btn:hover{background:var(--paper2)}
.thalia-btn{font-family:var(--ff-body);font-size:10px;white-space:nowrap;padding:2px 8px;border-radius:3px;border:1px solid #1a5276;color:#1a5276;background:#eaf4fb;text-decoration:none;flex-shrink:0;line-height:1.8}
.thalia-btn:hover{background:#d6eaf8}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,23,18,.5);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--paper);border:1px solid var(--border2);border-radius:8px;padding:1.5rem;width:100%;max-width:620px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:var(--ff-display);font-size:1.3rem;font-weight:600;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.form-row{margin-bottom:.875rem}
.form-row label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.form-row input,.form-row textarea,.form-row select{font-family:var(--ff-body);width:100%;background:#fff;border:1px solid var(--border2);border-radius:4px;padding:7px 10px;font-size:13px;color:var(--ink);outline:none}
.form-row input:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row textarea{height:72px;resize:vertical}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.work-edit-row{display:grid;grid-template-columns:1fr 64px 90px 80px 28px;gap:6px;margin-bottom:6px;align-items:center}
.work-edit-row input,.work-edit-row select{font-family:var(--ff-body);background:#fff;border:1px solid var(--border2);border-radius:3px;padding:5px 7px;font-size:12px;color:var(--ink);width:100%;outline:none}
.work-edit-row input:focus,.work-edit-row select:focus{border-color:var(--accent)}
.rm-btn{background:transparent;border:none;color:var(--ink3);cursor:pointer;font-size:15px;padding:2px;border-radius:3px}
.rm-btn:hover{color:#791f1f;background:var(--red-bg)}
.add-work-btn{font-family:var(--ff-body);font-size:12px;background:transparent;border:1px dashed var(--border2);border-radius:3px;padding:5px 12px;width:100%;cursor:pointer;color:var(--ink3);margin-top:2px}
.add-work-btn:hover{background:var(--paper2)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:.875rem;border-top:1px solid var(--border)}
.btn-cancel-m{font-family:var(--ff-body);background:transparent;border:1px solid var(--border2);border-radius:4px;padding:8px 18px;font-size:13px;cursor:pointer;color:var(--ink2)}
.btn-save-m{font-family:var(--ff-body);background:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:8px 18px;font-size:13px;cursor:pointer;color:#fff;font-weight:600}
.btn-save-m:hover{background:var(--accent2);border-color:var(--accent2)}
footer{text-align:center;font-size:11px;color:var(--ink4);padding:2rem;border-top:1px solid var(--border);font-style:italic}
@media(max-width:600px){header{padding:1rem;gap:1rem}main{padding:1rem 1rem 3rem}.stats-bar{padding:.5rem 1rem}.author-grid{grid-template-columns:1fr}.header-title h1{font-size:1.5rem}}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <svg width="44" height="48" viewBox="0 0 44 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
  <rect x="2" y="35" width="40" height="8" rx="2" fill="#c4622e" opacity="0.9"/>
  <rect x="4" y="33" width="36" height="3" rx="1" fill="#a07828" opacity="0.6"/>
  <rect x="5" y="24" width="34" height="10" rx="2" fill="#8b3a2a" opacity="0.85"/>
  <rect x="7" y="22" width="30" height="3" rx="1" fill="#c4622e" opacity="0.5"/>
  <rect x="8" y="15" width="28" height="8" rx="2" fill="#a07828" opacity="0.9"/>
  <rect x="10" y="13" width="24" height="3" rx="1" fill="#8b3a2a" opacity="0.5"/>
  <rect x="11" y="7" width="22" height="7" rx="2" fill="#3a6b42" opacity="0.85"/>
  <rect x="13" y="5" width="18" height="3" rx="1" fill="#3a6b42" opacity="0.45"/>
  <rect x="14" y="0" width="16" height="6" rx="2" fill="#4a4540" opacity="0.7"/>
  <line x1="18" y1="0" x2="18" y2="6" stroke="#faf8f4" stroke-width="0.8" opacity="0.4"/>
  <line x1="15" y1="7" x2="15" y2="14" stroke="#faf8f4" stroke-width="0.8" opacity="0.3"/>
  <line x1="12" y1="15" x2="12" y2="22" stroke="#faf8f4" stroke-width="0.8" opacity="0.3"/>
  <line x1="9" y1="24" x2="9" y2="34" stroke="#faf8f4" stroke-width="0.8" opacity="0.3"/>
</svg>
    <div class="header-title">
      <h1>Meine Literatur</h1>
      <p class="header-sub">Lieblingsschriftsteller &amp; Leseliste</p>
    </div>
  </div>
  <div class="header-controls">
    <div class="search-wrap">
      <span class="search-icon">&#8981;</span>
      <input type="text" id="search" placeholder="Suchen&hellip;" oninput="onSearch()">
    </div>
    <button class="btn active" id="f-all" onclick="setFilter('all',this)">Alle</button>
    <button class="btn" id="f-tbr" onclick="setFilter('tbr',this)">TBR</button>
    <button class="btn" id="f-gelesen" onclick="setFilter('gelesen',this)">Gelesen</button>
    <button class="btn btn-edit" id="edit-toggle" onclick="toggleEdit()">Bearbeiten</button>
    <button class="btn btn-export" onclick="exportHTML()">&#8615; Exportieren</button>
  </div>
</header>

<div class="stats-bar">
  <span id="stat-text"></span>
  <span class="save-indicator" id="save-indicator">&#10003; Gespeichert</span>
</div>

<main id="main">
  <div class="edit-add-bar">
    <button class="btn" style="border-color:var(--accent);color:var(--accent)" onclick="openModal(null)">+ Neuen Schriftsteller hinzuf&uuml;gen</button>
  </div>
  <div id="top10-container"></div>
  <div id="content"></div>
</main>

<footer>&#196;nderungen werden automatisch im Browser gespeichert &mdash; &bdquo;Exportieren&ldquo; erzeugt die aktualisierte HTML-Datei zum Hochladen auf GitHub.</footer>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title">Schriftsteller hinzuf&uuml;gen</h2>
    <div class="form-grid2">
      <div class="form-row"><label>Name <span style="color:#c4622e">*</span></label><input type="text" id="m-name" placeholder="Vollst&auml;ndiger Name"></div>
      <div class="form-row"><label>Lebensdaten</label><input type="text" id="m-years" placeholder="z.B. 1828&ndash;1910"></div>
    </div>
    <div class="form-grid2">
      <div class="form-row"><label>Land</label><input type="text" id="m-country" placeholder="z.B. Frankreich"></div>
      <div class="form-row"><label>Genres (Komma-getrennt)</label><input type="text" id="m-genres" placeholder="z.B. Realismus, Roman"></div>
    </div>
    <div class="form-row"><label>Kurz-Bio</label><textarea id="m-bio" placeholder="Kurze Beschreibung des Autors&hellip;"></textarea></div>
    <div class="form-row">
      <label>Hauptwerke</label>
      <div style="display:grid;grid-template-columns:1fr 64px 90px 80px 28px;gap:6px;margin-bottom:4px">
        <span style="font-size:10px;color:var(--ink3)">Titel</span>
        <span style="font-size:10px;color:var(--ink3)">Jahr</span>
        <span style="font-size:10px;color:var(--ink3)">Status</span>
        <span style="font-size:10px;color:var(--ink3)">Prio</span>
        <span></span>
      </div>
      <div id="works-editor"></div>
      <button class="add-work-btn" onclick="addWorkRow()">+ Werk hinzuf&uuml;gen</button>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel-m" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save-m" onclick="saveAuthor()">Speichern</button>
    </div>
  </div>
</div>

<script>

var DEFAULT_AUTHORS = [
  {
    "id": 1,
    "name": "Leo Tolstoi",
    "years": "1828–1910",
    "country": "Russland",
    "genres": [
      "Realismus",
      "Epischer Roman"
    ],
    "bio": "Einer der bedeutendsten Schriftsteller der Weltliteratur. Romane, Novellen und moralphilosophische Schriften. Beeinflusste Generationen von Autoren und Denkern.",
    "works": [
      {
        "title": "Krieg und Frieden",
        "year": 1869,
        "read": false,
        "tbr": 1
      },
      {
        "title": "Anna Karenina",
        "year": 1878,
        "read": false,
        "tbr": 1
      },
      {
        "title": "Auferstehung",
        "year": 1899,
        "read": false,
        "tbr": 2

function exportHTML() {
  var src = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  // Replace DEFAULT_AUTHORS data
  var m1s = src.indexOf('var DEFAULT_AUTHORS = [');
  var m1e = src.indexOf('\n];', m1s) + 3;
  if (m1s !== -1) src = src.slice(0, m1s) + 'var DEFAULT_AUTHORS = ' + JSON.stringify(authors, null, 2) + ';' + src.slice(m1e);
  // Replace TOP10_DEFAULT data
  var m2s = src.indexOf('var TOP10_DEFAULT = ');
  var m2e = src.indexOf(';', m2s) + 1;
  if (m2s !== -1) src = src.slice(0, m2s) + 'var TOP10_DEFAULT = ' + JSON.stringify(top10) + ';' + src.slice(m2e);
  var blob = new Blob([src], {type:'text/html;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'meine-literatur.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function toggleRead(authorId, workIdx) {
  var a = authors.find(function(x){ return x.id === authorId; });
  if (!a) return;
  a.works[workIdx].read = !a.works[workIdx].read;
  if (a.works[workIdx].read) a.works[workIdx].tbr = null;
  saveAuthors();
  render();
  requestAnimationFrame(function(){
    var body = document.getElementById('body-' + authorId);
    var exp = document.getElementById('exp-' + authorId);
    if (body) { body.classList.add('open'); if (exp) exp.style.transform = 'rotate(90deg)'; }
  });
}
function setPrio(authorId, workIdx, val) {
  var a = authors.find(function(x){ return x.id === authorId; });
  if (!a) return;
  a.works[workIdx].tbr = val ? parseInt(val) : null;
  saveAuthors();
  render();
  requestAnimationFrame(function(){
    var body = document.getElementById('body-' + authorId);
    var exp = document.getElementById('exp-' + authorId);
    if (body) { body.classList.add('open'); if (exp) exp.style.transform = 'rotate(90deg)'; }
  });
}

function getOrderedTbr(prio) {
  var all = [];
  authors.forEach(function(a){
    a.works.forEach(function(w){
      if (!w.read && w.tbr === prio) all.push({authorId:a.id, authorName:a.name, title:w.title, year:w.year});
    });
  });
  var order = tbrOrder[prio] || [];
  var ordered = [];
  order.forEach(function(o){
    var found = all.find(function(x){ return x.authorId === o.authorId && x.title === o.title; });
    if (found) ordered.push(found);
  });
  all.forEach(function(x){
    if (!ordered.find(function(o){ return o.authorId === x.authorId && o.title === x.title; })) ordered.push(x);
  });
  return ordered;
}
function moveTbrItem(prio, idx, dir) {
  var items = getOrderedTbr(prio);
  var ni = idx + dir;
  if (ni < 0 || ni >= items.length) return;
  var tmp = items[idx]; items[idx] = items[ni]; items[ni] = tmp;
  tbrOrder[prio] = items.map(function(x){ return {authorId:x.authorId, title:x.title}; });
  saveTbrOrder();
  render();
  requestAnimationFrame(function(){
    var body = document.getElementById('tbr-body-' + prio);
    if (body) body.classList.add('open');
    var head = document.getElementById('tbr-head-' + prio);
    if (head) head.classList.add('open');
    openTbrPrios[prio] = true;
  });
}

function moveTop10(idx, dir) {

function renderTop10() {
  var container = document.getElementById('top10-container');
  if (!container) return;
  var rankColors = ['top10-rank-1','top10-rank-2','top10-rank-3'];
  var rankSymbols = {0:'&#9312;', 1:'&#9313;', 2:'&#9314;'};

  var rows = top10.map(function(entry, i){
    var rankCls   = i < 3 ? rankColors[i] : '';
    var rankLabel = i < 3 ? rankSymbols[i] : (i + 1);

    var authorSel = '<select class="top10-author-sel" style="width:100%" onchange="setTop10Author(' + i + ',this.value)">';
    authorSel += '<option value=""' + (!entry.authorName ? ' selected' : '') + '>\u2014 Autor w\u00e4hlen</option>';
    authors.forEach(function(a){
      authorSel += '<option value="' + esc(a.name) + '"' + (entry.authorName === a.name ? ' selected' : '') + '>' + esc(a.name) + '</option>';
    });
    authorSel += '</select>';

    var novelPart = '';
    var thaliaBtn = '';
    if (entry.authorName) {
      var selAuthor = authors.find(function(a){ return a.name === entry.authorName; });
      if (selAuthor && selAuthor.works.length > 0) {
        var novelSel = '<select class="top10-author-sel" style="width:100%" onchange="setTop10Novel(' + i + ',this.value)">';
        novelSel += '<option value=""' + (!entry.novel ? ' selected' : '') + '>\u2014 Roman w\u00e4hlen</option>';
        selAuthor.works.forEach(function(w){
          novelSel += '<option value="' + esc(w.title) + '"' + (entry.novel === w.title ? ' selected' : '') + '>' + esc(w.title) + '</option>';
        });
        novelSel += '</select>';
        novelPart = novelSel;
      }
      if (entry.novel) {
        var q = encodeURIComponent(entry.novel + ' ' + entry.authorName);
        thaliaBtn = '<a href="https://www.thalia.de/suche?sq=' + q + '" target="_blank" class="thalia-btn" title="Bei Thalia suchen">Thalia &#8599;</a>';
      }
    } else {
      novelPart = '<span style="font-size:11px;color:var(--ink4);font-style:italic">erst Autor w\u00e4hlen</span>';
    }

    return '<div class="top10-row">'
      + '<div class="top10-rank ' + rankCls + '">' + rankLabel + '</div>'
      + '<div class="top10-move">'
      + '<button class="top10-arrow" onclick="moveTop10(' + i + ',-1)"' + (i === 0 ? ' disabled' : '') + ' title="Nach oben">&#9650;</button>'
      + '<button class="top10-arrow" onclick="moveTop10(' + i + ',1)"' + (i === top10.length - 1 ? ' disabled' : '') + ' title="Nach unten">&#9660;</button>'
      + '</div>'
      + '<div style="flex:1.3;min-width:0">' + authorSel + '</div>'
      + '<div style="flex:2;min-width:0;display:flex;align-items:center;gap:6px">' + novelPart + thaliaBtn + '</div>'
      + '<button class="top10-del" onclick="removeTop10Row(' + i + ')" title="Entfernen">&#215;</button>'
      + '</div>';
  }).join('');

  var addBtn = top10.length < 10
    ? '<button class="top10-add-btn" onclick="addTop10Row()">+ Eintrag hinzuf\u00fcgen</button>'
    : '';

  var filled = top10.filter(function(e){ return e.authorName; }).length;
  container.innerHTML = '<div class="top10-section">'
    + '<div class="top10-heading' + (openTop10 ? ' open' : '') + '" id="top10-head" onclick="toggleTop10()">'
    + '<span class="top10-crown">&#9733;</span>'
    + '<span class="top10-title">Meine Top-10-Schriftsteller</span>'
    + '<span class="top10-subtitle">' + filled + ' von ' + top10.length + ' eingetragen</span>'
    + '<span class="top10-chevron">&#8250;</span>'
    + '</div>'
    + '<div class="top10-body' + (openTop10 ? ' open' : '') + '" id="top10-body">'
    + '<p class="top10-hint">Autor w\u00e4hlen \u2192 Roman aus Werkliste w\u00e4hlen \u2192 Thalia-Link erscheint automatisch \u00b7 Reihenfolge mit &#9650;&#9660; anpassen</p>'
    + '<div style="display:grid;grid-template-columns:22px 28px 1.3fr 2fr 22px;gap:8px;padding:2px 0 6px;font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3)">'
    + '<span></span><span></span><span>Autor</span><span>Lieblings-Roman</span><span></span>'
    + '</div>'

function buildWorkRow(a, w, wi) {
  var dotCls = w.read ? 'dot-read' : 'dot-unread';
  var dotTitle = w.read ? 'Als ungelesen markieren' : 'Als gelesen markieren';
  var titleCls = w.read ? 'work-title is-read' : 'work-title';
  var right = '';
  if (w.read) {
    right = '<span class="read-check">&#10003;</span>';
  } else {
    right += '<select class="prio-sel" title="TBR-Priorit\u00e4t" onchange="setPrio(' + a.id + ',' + wi + ',this.value)">';
    right += '<option value=""' + (!w.tbr ? ' selected' : '') + '>&#8212;</option>';
    right += '<option value="1"' + (w.tbr===1 ? ' selected' : '') + '>P1</option>';
    right += '<option value="2"' + (w.tbr===2 ? ' selected' : '') + '>P2</option>';
    right += '<option value="3"' + (w.tbr===3 ? ' selected' : '') + '>P3</option>';
    right += '</select>';
    if (w.tbr) right += '<span class="prio-badge p' + w.tbr + '">Prio ' + w.tbr + '</span>';
  }
  return '<div class="work-row">'
    + '<div class="dot ' + dotCls + '" title="' + dotTitle + '" onclick="toggleRead(' + a.id + ',' + wi + ')"></div>'
    + '<div class="' + titleCls + '">' + esc(w.title) + '</div>'
    + '<div class="work-year">' + w.year + '</div>'
    + right
    + '</div>';
}

function render() {
  var q = document.getElementById('search').value.toLowerCase();
  var isSearching = q.length > 0;
  var list = authors.filter(function(a){
    var m = a.name.toLowerCase().indexOf(q) >= 0
      || a.country.toLowerCase().indexOf(q) >= 0
      || a.genres.some(function(g){ return g.toLowerCase().indexOf(q) >= 0; });
    if (!m) return false;
    if (activeFilter === 'tbr') return a.works.some(function(w){ return !w.read && w.tbr; });
    if (activeFilter === 'gelesen') return a.works.some(function(w){ return w.read; });
    return true;
  });

  if (isSearching) {
    list.forEach(function(a){ openCountries[a.country] = true; });
  }

  var totalRead = authors.reduce(function(s,a){ return s + a.works.filter(function(w){ return w.read; }).length; }, 0);
  var totalTbr  = authors.reduce(function(s,a){ return s + a.works.filter(function(w){ return !w.read && w.tbr; }).length; }, 0);
  var totalW    = authors.reduce(function(s,a){ return s + a.works.length; }, 0);
  document.getElementById('stat-text').innerHTML = '<strong>' + authors.length + '</strong> Schriftsteller &ensp;<strong>' + totalW + '</strong> Werke &ensp;<strong>' + totalRead + '</strong> gelesen &ensp;<strong>' + totalTbr + '</strong> TBR';

  var grouped = {};
  list.forEach(function(a){ if (!grouped[a.country]) grouped[a.country]=[]; grouped[a.country].push(a); });
  var seen = {};
  var allCountries = COUNTRY_ORDER.concat(Object.keys(grouped)).filter(function(c){
    if (seen[c] || !grouped[c]) return false;
    seen[c] = true; return true;
  });

  var html = '';

  allCountries.forEach(function(country){
    var group = grouped[country];
    var isOpen = !!openCountries[country];
    var safe = country.replace(/[\s\/\u00a0]/g,'_');
    var escapedCountry = country.replace(/'/g,"\\'");
    html += '<div class="country-section">'
      + '<div class="country-heading' + (isOpen?' open':'') + '" id="ch-' + safe + '" onclick="toggleCountry(\'' + escapedCountry + '\')">'
      + '<span class="country-flag">' + (FLAGS[country]||'\ud83c\udf0d') + '</span>'
      + '<span class="country-name">' + esc(country) + '</span>'
      + '<span class="country-count">' + group.length + ' Autor' + (group.length!==1?'en':'') + '</span>'
      + '<span class="country-chevron">&#8250;</span>'
      + '</div>'
      + '<div class="country-body' + (isOpen?' open':'') + '" id="cb-' + safe + '">'
      + '<div class="author-grid">';

    group.forEach(function(a){
      var read = a.works.filter(function(w){ return w.read; }).length;
      var tbr  = a.works.filter(function(w){ return !w.read && w.tbr; });
      var minP = tbr.length ? Math.min.apply(null, tbr.map(function(t){ return t.tbr; })) : null;

      var tags = a.genres.map(function(g){ return '<span class="tag tag-genre">' + esc(g) + '</span>'; }).join('');
      tags += '<span class="tag tag-read">' + read + ' gelesen</span>';
      if (tbr.length) tags += '<span class="tag tag-tbr">' + tbr.length + ' TBR</span>';
      if (minP===1) tags += '<span class="tag tag-prio1">Prio 1 offen</span>';

      var workRows = a.works.map(function(w,wi){ return buildWorkRow(a,w,wi); }).join('');

      html += '<div class="author-card" id="card-' + a.id + '">'
        + '<div class="card-head" onclick="toggleCard(' + a.id + ')">'
        + '<div class="avatar" style="' + avStyle(a.id) + '">' + initials(a.name) + '</div>'
        + '<div class="card-meta">'
        + '<h3>' + esc(a.name) + '</h3>'
        + '<div class="years">' + esc(a.years) + ' &middot; ' + esc(a.country) + '</div>'
        + '<div class="tag-row">' + tags + '</div>'
        + '</div>'
        + '<span class="expand-btn" id="exp-' + a.id + '">&#8250;</span>'
        + '</div>'
        + '<div class="card-body" id="body-' + a.id + '">'
        + '<p class="bio-text">' + esc(a.bio) + '</p>'
        + '<div class="mini-stats">'
        + '<div class="mini-stat"><div class="n">' + a.works.length + '</div><div class="l">Werke</div></div>'
        + '<div class="mini-stat"><div class="n">' + read + '</div><div class="l">Gelesen</div></div>'
        + '<div class="mini-stat"><div class="n">' + tbr.length + '</div><div class="l">TBR</div></div>'
        + '</div>'
        + '<div class="works-label">Hauptwerke <span class="works-hint">(Punkt = gelesen/ungelesen)</span></div>'
        + workRows
        + '</div>'
        + '<div class="edit-actions">'
        + '<button class="edit-btn" onclick="openModal(' + a.id + ')">Bearbeiten</button>'
        + '<button class="edit-btn del" onclick="deleteAuthor(' + a.id + ')">L\u00f6schen</button>'
        + '</div>'
        + '</div>';
    });

    html += '</div></div></div>';
  });

  // TBR — nach dieser Liste ist Schluss
  var hasTbr = authors.some(function(a){ return a.works.some(function(w){ return !w.read && w.tbr; }); });
  if (hasTbr && activeFilter !== 'gelesen') {
    var prioLabels = {1:'H\u00f6chste Priorit\u00e4t', 2:'Mittlere Priorit\u00e4t', 3:'Niedrige Priorit\u00e4t'};
    html += '<div class="tbr-section"><h2>To-be-read &mdash; Gesamtliste</h2>';
    [1,2,3].forEach(function(prio){
      var items = getOrderedTbr(prio);
      if (!items.length) return;
      var isOpen = !!openTbrPrios[prio];
      html += '<div class="tbr-prio-group">'
        + '<div class="tbr-prio-head' + (isOpen?' open':'') + '" id="tbr-head-' + prio + '" onclick="toggleTbrPrio(' + prio + ')">'
        + '<span class="prio-badge p' + prio + '">Prio ' + prio + '</span>'
        + '<span class="tbr-prio-title">' + prioLabels[prio] + '</span>'
        + '<span class="tbr-prio-count">' + items.length + ' Buch' + (items.length!==1?'er':'') + '</span>'
        + '<span class="tbr-prio-chevron">&#8250;</span>'
        + '</div>'
        + '<div class="tbr-prio-body' + (isOpen?' open':'') + '" id="tbr-body-' + prio + '">';
      items.forEach(function(b,i){
        html += '<div class="tbr-row">'
          + '<div class="tbr-num">' + (i+1) + '</div>'
          + '<div class="tbr-move">'
          + '<button class="tbr-arrow" onclick="moveTbrItem(' + prio + ',' + i + ',-1)"' + (i===0?' disabled':'') + ' title="Nach oben">&#9650;</button>'
          + '<button class="tbr-arrow" onclick="moveTbrItem(' + prio + ',' + i + ',1)"' + (i===items.length-1?' disabled':'') + ' title="Nach unten">&#9660;</button>'
          + '</div>'
          + '<div class="tbr-title">' + esc(b.title) + '</div>'
          + '<div class="tbr-author">&mdash; ' + esc(b.authorName) + '</div>'
          + '</div>';
      });
      html += '</div></div>';
    });
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;
  renderTop10();
}

function deleteAuthor(id) {
  if (!confirm('Schriftsteller wirklich l\u00f6schen?')) return;
  authors = authors.filter(function(a){ return a.id !== id; });
  saveAuthors(); render();
}
function openModal(id) {
  editingId = id;
  var m = id ? authors.find(function(a){ return a.id === id; }) : null;
  document.getElementById('modal-title').textContent = id ? 'Schriftsteller bearbeiten' : 'Neuen Schriftsteller hinzuf\u00fcgen';
  document.getElementById('m-name').value   = m ? m.name : '';
  document.getElementById('m-years').value  = m ? m.years : '';
  document.getElementById('m-country').value= m ? m.country : '';
  document.getElementById('m-genres').value = m ? m.genres.join(', ') : '';
  document.getElementById('m-bio').value    = m ? m.bio : '';
  document.getElementById('works-editor').innerHTML = '';
  workRowCount = 0;
  if (m) m.works.forEach(function(w){ addWorkRow(w); }); else addWorkRow();
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); editingId = null; }
function addWorkRow(w) {
  var id = workRowCount++;
  var row = document.createElement('div');
  row.className = 'work-edit-row';
  row.innerHTML = '<input type="text" id="wt-' + id + '" placeholder="Titel" value="' + (w ? esc(w.title) : '') + '">'
    + '<input type="number" id="wy-' + id + '" placeholder="Jahr" value="' + (w ? w.year : '') + '" min="1000" max="2099">'
    + '<select id="wr-' + id + '"><option value="no"' + (w&&!w.read?' selected':'') + '>Nicht gelesen</option><option value="yes"' + (w&&w.read?' selected':'') + '>Gelesen</option></select>'
    + '<select id="wp-' + id + '"><option value=""' + (!w||!w.tbr?' selected':'') + '>&#8212;</option><option value="1"' + (w&&w.tbr==1?' selected':'') + '>Prio 1</option><option value="2"' + (w&&w.tbr==2?' selected':'') + '>Prio 2</option><option value="3"' + (w&&w.tbr==3?' selected':'') + '>Prio 3</option></select>'
    + '<button class="rm-btn" onclick="this.parentElement.remove()">&#215;</button>';
  document.getElementById('works-editor').appendChild(row);
}
function saveAuthor() {
  var name = document.getElementById('m-name').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }
  var works = [];
  document.querySelectorAll('.work-edit-row').forEach(function(row){
    var id = row.querySelector('input[type=text]').id.replace('wt-','');
    var t = (document.getElementById('wt-'+id)||{value:''}).value.trim();
    if (!t) return;
    var pv = (document.getElementById('wp-'+id)||{value:''}).value;
    works.push({title:t, year:parseInt((document.getElementById('wy-'+id)||{value:''}).value)||'', read:(document.getElementById('wr-'+id)||{value:'no'}).value==='yes', tbr:pv?parseInt(pv):null});
  });
  var entry = {id:editingId||nextId, name:name, years:document.getElementById('m-years').value, country:document.getElementById('m-country').value||'Unbekannt', genres:document.getElementById('m-genres').value.split(',').map(function(s){return s.trim();}).filter(Boolean), bio:document.getElementById('m-bio').value, works:works};
  if (editingId) {
    var idx = authors.findIndex(function(a){ return a.id===editingId; });
    if (idx > -1) authors[idx] = entry;
  } else { authors.push(entry); nextId++; }
  saveAuthors(); closeModal(); render();
}
document.getElementById('modal-bg').addEventListener('click', function(e){ if (e.target===this) closeModal(); });
render();

</script>

</body>
</html>
